  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ckground-position:600px -200px;} }\n@keyframes glyphFlick {\n  0%,90%,100% { transform:translate(0,0); opacity:var(--gop,.5); clip-path:inset(0 0 0 0); }\n  91%   { transform:translate(-4px,1px);  opacity:.82; clip-path:inset(18% 0 62% 0); }\n  92.5% { transform:translate(5px,-2px);  opacity:.30; clip-path:inset(68% 0 14% 0); }\n  94%   { transform:translate(-2px,0);    opacity:.72; clip-path:inset(0 0 0 0); }\n  95.5% { transform:translate(3px,2px);   opacity:var(--gop,.5); clip-path:inset(42% 0 36% 0); }\n}\n@keyframes glyphSliceA {\n  0%,86%,100% { transform:translate(0,0); clip-path:inset(0 0 0 0); }\n  87% { transform:translate(8px,0);   clip-path:inset(8% 0 76% 0); }\n  90% { transform:translate(-10px,0); clip-path:inset(54% 0 26% 0); }\n  93% { transform:translate(4px,0);   clip-path:inset(82% 0 4% 0); }\n}\n@keyframes glyphSliceB {\n  0%,84%,100% { transform:translate(0,0); clip-path:inset(0 0 0 0); }\n  85% { transform:translate(-7px,2px); clip-path:inset(28% 0 52% 0); }\n  88% { transform:translate(9px,-1px); clip-path:inset(64% 0 18% 0); }\n  91% { transform:translate(-5px,0);   clip-path:inset(4% 0 82% 0); }\n}\n@media (prefers-reduced-motion: reduce){\n  .glyph-layer,.glyph-layer::before,.glyph-layer::after{ animation:none !important; }\n}\n\n/* Custom cursor */\n#cursor {\n  position:fixed; pointer-events:none; z-index:900;\n  width:6px; height:6px;\n  border-radius:50%;\n  background:var(--pink-bright);\n  transform:translate(-50%,-50%);\n  transition:transform .08s ease, opacity .2s;\n  box-shadow:0 0 12px 4px rgba(240,96,192,.5);\n  mix-blend-mode:screen;\n}\n#cursor-ring {\n  position:fixed; pointer-events:none; z-index:899;\n  width:32px; height:32px;\n  border-radius:50%;\n  border:1px solid rgba(240,96,192,.3);\n  transform:translate(-50%,-50%);\n  transition:transform .18s ease, width .2s, height .2s, opacity .2s, border-color .2s;\n}\nbody:hover #cursor { opacity:1; }\n\n/* UI LAYER */\n#ui {\n  position:fixed; inset:0; z-index:10;\n  display:flex; flex-direction:column;\n  align-items:center; justify-content:center;\n  pointer-events:none;\n}\n\n/* Top bar */\n#topbar {\n  position:fixed; top:0; left:0; right:0; z-index:20;\n  padding:0 40px; height:52px;\n  display:flex; align-items:center; justify-content:space-between;\n  pointer-events:all;\n  opacity:0;\n  border-bottom:1px solid rgba(224,64,160,.08);\n}\n.tb-brand {\n  font-family:'Cinzel',serif; font-size:11px; letter-spacing:8px;\n  color:rgba(248,228,248,.85);\n  text-shadow:0 0 20px rgba(224,64,160,.55);\n}\n.tb-right {\n  display:flex; align-items:center; gap:6px;\n  font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:3px; color:rgba(240,216,240,.5);}\n.tb-donate {\n  font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:3px; color:#fff;\n  text-decoration:none; border:1px solid var(--pink-bright); padding:6px 14px; margin-left:14px;\n  background:var(--pink); transition:all .15s; pointer-events:all; box-shadow:0 0 12px rgba(224,64,160,.5);\n}\n.tb-donate:hover { background:var(--pink-bright); box-shadow:0 0 22px rgba(240,96,192,.7),0 0 44px rgba(224,64,160,.4); }\n.on-dot {\n  width:5px; height:5px; border-radius:50%; background:var(--pink-bright);\n  animation:pulse 2s infinite;\n}\n@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 8px var(--pink)} 50%{opacity:.3;box-shadow:none} }\n\n/* Main wordmark */\n.wordmark {\n  font-family:'Cinzel',serif; font-weight:900;\n  font-size:clamp(56px,10vw,128px);\n  letter-spacing:clamp(8px,1.5vw,20px);\n  color:transparent;\n  background:linear-gradient(180deg, rgba(240,216,240,1) 0%, rgba(200,120,200,.6) 100%);\n  -webkit-background-clip:text; background-clip:text;\n  line-height:1;\n  text-align:center;\n  opacity:0;\n  transform:translateY(20px);\n  text-shadow:none;\n  filter:drop-shadow(0 0 40px rgba(224,64,160,.3));\n  transition:filter .3s;\n}\n.wordmark:hover { filter:drop-shadow(0 0 60px rgba(224,64,160,.6)); }\n\n.tagline {\n  font-family:'Share Tech Mono',monospace;\n  font-size:clamp(7px,1vw,9px); letter-spacing:clamp(4px,.8vw,8px);\n  color:rgba(224,64,160,.7);\n  margin-top:20px;\n  opacity:0; transform:translateY(10px);\n  text-align:center;\n}\n\n.divider {\n  width:clamp(120px,20vw,260px); height:1px;\n  background:linear-gradient(90deg,transparent,rgba(224,64,160,.5),transparent);\n  margin:28px 0;\n  opacity:0;\n}\n\n/* Channel cards */\n.channels {\n  display:flex; gap:1px;\n  opacity:0; transform:translateY(16px);\n}\n.ch-card {\n  width:clamp(140px,18vw,200px);\n  border:1px solid rgba(255,255,255,.07);\n  padding:20px 24px;\n  cursor:pointer; pointer-events:all;\n  position:relative; overflow:hidden;\n  transition:border-color .25s, background .25s;\n  text-decoration:none;\n}\n.ch-card::before {\n  content:''; position:absolute; inset:0;\n  opacity:0; transition:opacity .25s;\n}\n.ch-card:hover { border-color:rgba(255,255,255,.2); }\n.ch-card:hover::before { opacity:1; }\n\n.ch-uno::before { background:rgba(255,113,206,.08); }\n.ch-uno:hover { border-color:rgba(255,113,206,.5); }\n.ch-uno .ch-num { color:#ff71ce; }\n.ch-uno .ch-dot { background:#ff71ce; box-shadow:0 0 10px #ff71ce, 0 0 24px rgba(255,113,206,.4); }\n\n.ch-dos::before { background:rgba(185,103,255,.08); }\n.ch-dos:hover { border-color:rgba(185,103,255,.5); }\n.ch-dos .ch-num { color:#b967ff; }\n.ch-dos .ch-dot { background:#b967ff; box-shadow:0 0 10px #b967ff, 0 0 24px rgba(185,103,255,.4); }\n\n.ch-dot { width:5px; height:5px; border-radius:50%; display:inline-block; margin-right:8px; }\n.ch-num { font-family:'Cinzel',serif; font-size:18px; letter-spacing:4px; display:flex; align-items:center; }\n.ch-format { font-family:'Share Tech Mono',monospace; font-size:6px; letter-spacing:3px; margin-top:9px; }\n.ch-uno .ch-format { color:rgba(255,113,206,.75); }\n.ch-dos .ch-format { color:rgba(185,103,255,.75); }\n.ch-genre { font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:3px; color:rgba(240,216,240,.55); margin-top:8px; line-height:1.7; }\n\n/* Enter button */\n.enter-btn {\n  margin-top:40px;\n  font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:6px;\n  color:rgba(240,216,240,.7);\n  border:1px solid rgba(240,216,240,.22);\n  padding:14px 36px;\n  cursor:pointer; pointer-events:all;\n  text-decoration:none;\n  transition:all .2s;\n  opacity:0;\n  position:relative; overflow:hidden;\n}\n.enter-btn::before {\n  content:''; position:absolute; inset:0;\n  background:linear-gradient(90deg,transparent,rgba(224,64,160,.06),transparent);\n  transform:translateX(-100%); transition:transform .4s;\n}\n.enter-btn:hover { color:var(--pink-bright); border-color:rgba(224,64,160,.4); }\n.enter-btn:hover::before { transform:translateX(100%); }\n\n/* Scroll hint */\n.scroll-hint {\n  position:fixed; bottom:32px; left:50%; transform:translateX(-50%);\n  font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:4px;\n  color:rgba(224,64,160,.3);\n  display:flex; flex-direction:column; align-items:center; gap:10px;\n  opacity:0; z-index:20; pointer-events:none;\n}\n.scroll-hint::after {\n  content:''; width:1px; height:28px;\n  background:linear-gradient(to bottom,rgba(224,64,160,.4),transparent);\n}\n\n/* Corner marks */\n.corner { position:fixed; width:28px; height:28px; opacity:.2; z-index:20; border-color:rgba(224,64,160,.6); border-style:solid; border-width:0; pointer-events:none; }\n.corner.tl { top:60px; left:32px; border-top-width:1px; border-left-width:1px; }\n.corner.tr { top:60px; right:32px; border-top-width:1px; border-right-width:1px; }\n.corner.bl { bottom:36px; left:32px; border-bottom-width:1px; border-left-width:1px; }\n.corner.br { bottom:36px; right:32px; border-bottom-width:1px; border-right-width:1px; }\n\n/* Scanline */\n@keyframes scan { 0%{top:-2%} 100%{top:102%} }\n.scanline {\n  position:fixed; left:0; right:0; height:1px; pointer-events:none; z-index:15;\n  background:linear-gradient(90deg,transparent,rgba(224,64,160,.07),transparent);\n  animation:scan 8s linear infinite;\n}\n\n/* frequency spectrum bottom */\n#freq {\n  position:fixed; bottom:0; left:0; right:0; height:48px; z-index:12;\n  display:flex; align-items:flex-end; gap:2px; padding:0 8px;\n  pointer-events:none; opacity:0;\n}\n.fbar { flex:1; background:rgba(224,64,160,.15); transition:height .1s; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<canvas id=\"bg\"><\u002Fcanvas>\n<div class=\"glyph-layer\"><\u002Fdiv>\n<div id=\"cursor\"><\u002Fdiv>\n<div id=\"cursor-ring\"><\u002Fdiv>\n<div class=\"scanline\"><\u002Fdiv>\n<div class=\"corner tl\"><\u002Fdiv>\n<div class=\"corner tr\"><\u002Fdiv>\n<div class=\"corner bl\"><\u002Fdiv>\n<div class=\"corner br\"><\u002Fdiv>\n\n<!-- Frequency bars -->\n<div id=\"freq\"><\u002Fdiv>\n\n<!-- Top bar -->\n<div id=\"topbar\">\n  <div class=\"tb-brand\">SELEXIONES<\u002Fdiv>\n  <div class=\"tb-right\"><div class=\"on-dot\"><\u002Fdiv>ON AIR SAT 7PM–2AM<a href=\"https://linktr.ee/selexionesradio?utm_source=ig&amp;utm_medium=social&amp;utm_content=link_in_bio\" target=\"_blank\" class=\"tb-donate\">DONATE ♥<\u002Fa><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Main UI -->\n<div id=\"ui\">\n  <div class=\"wordmark\" id=\"wordmark\">SELEXIONES<\u002Fdiv>\n  <div class=\"tagline\" id=\"tagline\">CHICANO/LATINO RADIO · NORTH EAST LOS ANGELES<\u002Fdiv>\n  <div class=\"divider\" id=\"divider\"><\u002Fdiv>\n  <div class=\"channels\" id=\"channels\">\n    <a href=\"station.html#s2\" class=\"ch-card ch-uno\">\n      <div class=\"ch-num\"><div class=\"ch-dot\"><\u002Fdiv>UNO<\u002Fdiv>\n      <div class=\"ch-format\">SCHEDULED PROGRAM<\u002Fdiv>\n    <\u002Fa>\n    <a href=\"station.html#s2\" class=\"ch-card ch-dos\">\n      <div class=\"ch-num\"><div class=\"ch-dot\"><\u002Fdiv>DOS<\u002Fdiv>\n      <div class=\"ch-format\">MASS BUCKET · LIBRARY<\u002Fdiv>\n    <\u002Fa>\n  <\u002Fdiv>\n  <a href=\"station.html\" class=\"enter-btn\" id=\"enter-btn\">ENTER THE STATION →<\u002Fa>\n<\u002Fdiv>\n\n<div class=\"scroll-hint\" id=\"scroll-hint\">SCROLL<\u002Fdiv>\n\n<script>\n/* ── CURSOR ── */\nconst cur = document.getElementById('cursor');\nconst ring = document.getElementById('cursor-ring');\nlet mx = window.innerWidth/2, my = window.innerHeight/2;\nlet rx = mx, ry = my;\n\ndocument.addEventListener('mousemove', e => {\n  mx = e.clientX; my = e.clientY;\n  cur.style.left = mx+'px'; cur.style.top = my+'px';\n});\n\nfunction lerpCursor(){\n  rx += (mx-rx)*.12; ry += (my-ry)*.12;\n  ring.style.left = rx+'px'; ring.style.top = ry+'px';\n  requestAnimationFrame(lerpCursor);\n}\nlerpCursor();\n\ndocument.querySelectorAll('a,.enter-btn,.ch-card').forEach(el=>{\n  el.addEventListener('mouseenter',()=>{\n    ring.style.width='52px'; ring.style.height='52px';\n    ring.style.borderColor='rgba(224,64,160,.6)';\n  });\n  el.addEventListener('mouseleave',()=>{\n    ring.style.width='32px'; ring.style.height='32px';\n    ring.style.borderColor='rgba(224,64,160,.3)';\n  });\n});\n\n/* ── CANVAS PARTICLE FIELD ── */\nconst canvas = document.getElementById('bg');\nconst ctx = canvas.getContext('2d');\n\nlet W, H, particles = [], lines = [];\nconst PARTICLE_COUNT = 120;\n\nfunction resize(){\n  W = canvas.width = window.innerWidth;\n  H = canvas.height = window.innerHeight;\n}\nresize();\nwindow.addEventListener('resize', resize);\n\nclass Particle {\n  constructor(){\n    this.reset(true);\n  }\n  reset(init){\n    this.x = Math.random() * W;\n    this.y = init ? Math.random() * H : (Math.random() > .5 ? -10 : H+10);\n    this.size = Math.random() * 1.5 + .3;\n    this.speedX = (Math.random()-0.5) * .4;\n    this.speedY = (Math.random()-.7) * .3;\n    this.life = 0;\n    this.maxLife = 200 + Math.random() * 400;\n    this.hue = Math.random() > .5 ? 300 + Math.random()*40 : 270 + Math.random()*30;\n    this.sat = 60 + Math.random()*40;\n    this.brightness = 55 + Math.random()*30;\n    this.alpha = 0;\n  }\n  update(t){\n    // Wander\n    this.speedX += (Math.random()-.5)*.02;\n    this.speedY += (Math.random()-.5)*.02;\n    this.speedX *= .98; this.speedY *= .98;\n\n    // Mouse repulsion\n    const dx = this.x - mx, dy = this.y - my;\n    const dist = Math.sqrt(dx*dx+dy*dy);\n    if(dist < 120){\n      const force = (120-dist)/120;\n      this.speedX += (dx/dist)*force*.8;\n      this.speedY += (dy/dist)*force*.8;\n    }\n\n    this.x += this.speedX;\n    this.y += this.speedY;\n    this.life++;\n\n    // Fade in/out\n    const lifeRatio = this.life/this.maxLife;\n    if(lifeRatio < .1) this.alpha = lifeRatio/.1;\n    else if(lifeRatio > .8) this.alpha = 1-(lifeRatio-.8)/.2;\n    else this.alpha = 1;\n\n    if(this.life > this.maxLife || this.x<-20 || this.x>W+20 || this.y<-20 || this.y>H+20){\n      this.reset(false);\n    }\n  }\n  draw(){\n    ctx.save();\n    ctx.globalAlpha = this.alpha * .95;\n    ctx.beginPath();\n    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);\n    ctx.fillStyle = `hsl(${this.hue},${this.sat}%,${this.brightness}%)`;\n    ctx.fill();\n    // glow\n    const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*6);\n    g.addColorStop(0,`hsla(${this.hue},${this.sat}%,${this.brightness}%,.3)`);\n    g.addColorStop(1,'transparent');\n    ctx.globalAlpha = this.alpha * .5;\n    ctx.beginPath();\n    ctx.arc(this.x,this.y,this.size*6,0,Math.PI*2);\n    ctx.fillStyle = g;\n    ctx.fill();\n    ctx.restore();\n  }\n}\n\n// Cursor trail\nconst trail = [];\nconst TRAIL_LEN = 28;\n\nfor(let i=0;i<PARTICLE_COUNT;i++) particles.push(new Particle());\n\n// Frequency bars init\nconst freqEl = document.getElementById('freq');\nconst BAR_COUNT = 80;\nfor(let i=0;i<BAR_COUNT;i++){\n  const b=document.createElement('div');\n  b.className='fbar'; freqEl.appendChild(b);\n}\nconst fbars = freqEl.querySelectorAll('.fbar');\n\nlet t = 0;\nfunction draw(){\n  t++;\n  ctx.clearRect(0,0,W,H);\n\n  // Background gradient\n  ctx.fillStyle='#000';\n  ctx.fillRect(0,0,W,H);\n\n  // Vignette\n  const vig = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);\n  vig.addColorStop(0,'transparent');\n  vig.addColorStop(.7,'transparent');\n  vig.addColorStop(1,'rgba(0,0,0,.45)');\n  ctx.fillStyle=vig;\n  ctx.fillRect(0,0,W,H);\n\n  // Cursor spotlight\n  const spot = ctx.createRadialGradient(mx,my,0,mx,my,320);\n  spot.addColorStop(0,'rgba(185,103,255,.16)');\n  spot.addColorStop(.4,'rgba(255,113,206,.09)');\n  spot.addColorStop(1,'transparent');\n  ctx.fillStyle=spot;\n  ctx.fillRect(0,0,W,H);\n\n  // Trail\n  trail.push({x:mx,y:my,t});\n  if(trail.length>TRAIL_LEN) trail.shift();\n  for(let i=0;i<trail.length-1;i++){\n    const a = (i/trail.length)*.25;\n    const p = trail[i], n = trail[i+1];\n    ctx.save();\n    ctx.globalAlpha = a;\n    ctx.strokeStyle='rgba(240,96,192,.6)';\n    ctx.lineWidth = (i/trail.length)*2;\n    ctx.beginPath();\n    ctx.moveTo(p.x,p.y); ctx.lineTo(n.x,n.y);\n    ctx.stroke();\n    ctx.restore();\n  }\n\n  // Connection lines between close particles\n  for(let i=0;i<particles.length;i++){\n    for(let j=i+1;j<particles.length;j++){\n      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;\n      const d=Math.sqrt(dx*dx+dy*dy);\n      if(d<90){\n        ctx.save();\n        ctx.globalAlpha=(1-d/90)*.08;\n        ctx.strokeStyle='rgba(220,100,255,.8)';\n        ctx.lineWidth=.5;\n        ctx.beginPath();\n        ctx.moveTo(particles[i].x,particles[i].y);\n        ctx.lineTo(particles[j].x,particles[j].y);\n        ctx.stroke();\n        ctx.restore();\n      }\n    }\n  }\n\n  // Particles\n  particles.forEach(p=>{ p.update(t); p.draw(); });\n\n  // Frequency bars animation (fake audio reactive)\n  fbars.forEach((b,i)=>{\n    const wave = Math.sin(t*.03 + i*.18) * Math.cos(t*.02 + i*.09);\n    const rand = Math.sin(t*.11 + i*.3) * .5 + .5;\n    const h = Math.max(2, (wave*.5+.5) * rand * 36 + 2);\n    b.style.height = h+'px';\n    const pct = i/BAR_COUNT;\n    const isMagenta = pct < .5;\n    b.style.background = isMagenta\n      ? `rgba(255,113,206,${h/40*.5})`\n      : `rgba(185,103,255,${h/40*.5})`;\n  });\n\n  requestAnimationFrame(draw);\n}\ndraw();\n\n/* ── ENTRANCE ANIMATION ── */\nfunction animate(el, props, delay){\n  return new Promise(res=>{\n    setTimeout(()=>{\n      el.style.transition = `opacity .8s ease, transform .8s ease`;\n      Object.assign(el.style, props);\n      setTimeout(res, 800);\n    }, delay);\n  });\n}\n\nsetTimeout(async ()=>{\n  // Topbar\n  const tb = document.getElementById('topbar');\n  tb.style.transition='opacity 1s ease';\n  tb.style.opacity='1';\n\n  await animate(document.getElementById('wordmark'),{opacity:'1',transform:'translateY(0)'},300);\n  await animate(document.getElementById('tagline'),{opacity:'1',transform:'translateY(0)'},0);\n  await animate(document.getElementById('divider'),{opacity:'1'},0);\n  await animate(document.getElementById('channels'),{opacity:'1',transform:'translateY(0)'},0);\n  await animate(document.getElementById('enter-btn'),{opacity:'1'},100);\n\n  // Scroll hint & freq\n  const sh = document.getElementById('scroll-hint');\n  sh.style.transition='opacity 1s ease'; sh.style.opacity='1';\n\n  const freq = document.getElementById('freq');\n  freq.style.transition='opacity 1.5s ease'; freq.style.opacity='1';\n\n}, 400);\n\n/* ── WORDMARK GLITCH ON HOVER ── */\nconst wm = document.getElementById('wordmark');\nlet glitchTimeout;\nwm.addEventListener('mouseenter',()=>{\n  clearTimeout(glitchTimeout);\n  let count=0;\n  const chars = 'SELEXIONES'.split('');\n  const glitch = setInterval(()=>{\n    count++;\n    if(count>8){ clearInterval(glitch); wm.textContent='SELEXIONES'; return; }\n    wm.textContent = chars.map((c,i)=> Math.random()>.6 ? '█▓▒░X▄'[Math.floor(Math.random()*7)] : c).join('');\n  },60);\n  glitchTimeout = setTimeout(()=>{ clearInterval(glitch); wm.textContent='SELEXIONES'; },600);\n});\nwm.addEventListener('mouseleave',()=>{\n  clearTimeout(glitchTimeout); wm.textContent='SELEXIONES';\n});\n\n/* ── PARALLAX ── */\ndocument.addEventListener('mousemove',e=>{\n  const rx=(e.clientX/W-.5), ry=(e.clientY/H-.5);\n  wm.style.transform=`translateY(0) translate(${rx*8}px,${ry*4}px)`;\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
